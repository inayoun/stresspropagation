<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stress Propagation Visualization</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="header">
      <h1>Stress Propagation</h1>
      <div class="toolbar controls">
        <label for="conditionSelect" style="color:#e5e7eb;font-size:12px">Condition</label>
        <select id="conditionSelect">
          <option value="1">Baseline</option>
          <option value="2">Stress</option>
          <option value="3">Amusement</option>
          <option value="4">Meditation</option>
        </select>
        <button id="playPause">Play</button>
        <input id="scrubber" class="scrubber" type="range" min="0" max="100" value="0" />
      </div>
    </div>
    <div class="main">
      <div class="canvas" id="canvas"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="tooltip" class="tooltip" style="display:none"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
